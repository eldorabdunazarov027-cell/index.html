<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>Ro'yxatdan o'tish</title>

<body>

<h1>Ro'yxatdan o'tish formasi</h1>

<form>

    <label for="ism"><b>Ismingiz:</b></label><br>
    <input type="text" id="ism" placeholder="Ismingizni yozing"><br><br>

    <label for="email"><b>Email:</b></label><br>
    <input type="email" id="email" placeholder="emailingiz ni kiriting"><br><br>

    <label for="parol"><b>Parol:</b></label><br>
    <input type="password" id="parol" placeholder="Parol kiriting"><br><br>

    <label for="yosh"><b>Yosh:</b></label><br>
    <input type="number" id="yosh" placeholder="Yoshingiz"><br><br>

    <label for="haqida"><b>O'zingiz haqingizda:</b></label><br>
    <textarea id="haqida" rows="4" cols="30" placeholder="Qisqacha yozing"></textarea><br><br>

    <label for="davlat"><b>Davlat:</b></label><br>
    <select id="davlat">
        <optgroup label="Osiyo">
            <option>O'zbekiston</option>
            <option>Qozog'iston</option>
        </optgroup>

        <optgroup label="Yevropa">
            <option>Germaniya</option>
            <option>Fransiya</option>
        </optgroup>
    </select><br><br>

    <input type="submit" value="Ro'yxatdan o'tish">

</form>
